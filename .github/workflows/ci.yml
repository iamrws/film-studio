name: CI / Build & Package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # Phase 3: Security / Log Redaction checks (from PRODUCTION_READY_PLAN.md)
  security-checks:
    name: Security & Secrets Hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets / API keys
        uses: trufflesecurity/trufflehog@v3
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: Check for log redaction patterns
        run: |
          echo "Checking for unredacted sensitive patterns in log statements..."
          # Fail if any console.log/error contains raw API key patterns or tokens
          if grep -rn "console\.\(log\|error\|warn\)" src/ --include="*.ts" --include="*.tsx" | \
             grep -iE "(api[_-]?key|token|secret|password|private[_-]?key)" | \
             grep -v "// safe\|// redacted\|REDACTED\|\[REDACTED\]"; then
            echo "WARNING: Potential unredacted sensitive data in log statements above."
            echo "Ensure API keys, tokens, and secrets are never logged in plaintext."
            echo "Use [REDACTED] markers or omit them from log output entirely."
            exit 1
          fi
          echo "Log redaction check passed."

      - name: Validate platform-policy input patterns
        run: |
          echo "Checking for platform-policy input validation..."
          # Confirm zod is used for input validation (Phase 3 requirement)
          if grep -rn "import.*zod\|from 'zod'\|from \"zod\"" src/ --include="*.ts" --include="*.tsx" > /dev/null 2>&1; then
            echo "Zod validation found — input validation requirement satisfied."
          else
            echo "WARNING: No Zod imports found. Ensure platform inputs are validated."
          fi

  build-desktop:
    name: Build Desktop (${{ matrix.platform }})
    needs: [lint, test, security-checks]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: ''
            artifact-name: film-studio-macos
            artifact-path: src-tauri/target/release/bundle/dmg/*.dmg
          - platform: windows-latest
            target: ''
            artifact-name: film-studio-windows
            artifact-path: src-tauri/target/release/bundle/msi/*.msi
          - platform: ubuntu-22.04
            target: ''
            artifact-name: film-studio-linux
            artifact-path: src-tauri/target/release/bundle/deb/*.deb

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # ── Rust toolchain (cached) ─────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust toolchain / Cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      # ── Node / npm (cached) ─────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      # ── Linux system deps ────────────────────────────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libayatana-appindicator3-dev

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Add any required runtime env vars for the build here
          # TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          # TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: '' # empty = no release
          releaseName: ''
          releaseBody: ''
          releaseDraft: false
          prerelease: false

      # ── Upload artifacts ──────────────────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: warn
          retention-days: 7
